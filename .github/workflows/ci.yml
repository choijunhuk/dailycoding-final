name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailycoding
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dailycoding/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: VITE_API_URL="" npm run build

  backend:
    name: Backend (lint + catalog + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailycoding-server
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production
      ADMIN_PASSWORD: ci-test-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dailycoding-server/package-lock.json
      - name: Install dependencies (prod only)
        run: npm ci --omit=dev
      - name: Lint
        run: npx eslint src --ext .js --max-warnings 0
      - name: Validate shared catalog import
        run: node -e "import('./src/shared/problemCatalog.js').then((m)=>{ if(!Array.isArray(m.PROBLEMS)||m.PROBLEMS.length===0){ throw new Error('PROBLEMS export missing') } console.log('OK: PROBLEMS count =', m.PROBLEMS.length) }).catch((err)=>{ console.error(err); process.exit(1) })"
      - name: Install dev dependencies for tests
        run: npm ci
      - name: Unit tests
        run: npm test
